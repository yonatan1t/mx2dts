# CI: Convert IOCs to DTS and verify with Zephyr west build (hello_world).
# Uses the official Zephyr Docker image; only checks that DTS compiles (west build phase).
# Steps run on the host; Zephyr tools run inside Docker to avoid container permission issues.
name: DTS build (hello_world + IOCs)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-dts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mx2dts
        uses: actions/checkout@v4

      - name: Clone CubeMX database
        run: |
          git clone --depth 1 https://github.com/esden/stm32cube-database.git "$GITHUB_WORKSPACE/cubemx-db"

      - name: Cache west workspace
        uses: actions/cache@v4
        id: west-cache
        with:
          path: ${{ github.workspace }}/zephyrproject
          key: west-${{ runner.os }}-${{ hashFiles('.github/workflows/dts-build.yml') }}
          restore-keys: west-${{ runner.os }}-

      - name: West init and update (if cache miss)
        if: steps.west-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workdir" -w /workdir \
            -e GITHUB_WORKSPACE=/workdir \
            ghcr.io/zephyrproject-rtos/zephyr-build:latest \
            bash -c 'west init zephyrproject && cd zephyrproject && west update'

      - name: Convert IOCs and build hello_world (Zephyr Docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workdir" -w /workdir \
            -e GITHUB_WORKSPACE=/workdir \
            ghcr.io/zephyrproject-rtos/zephyr-build:latest \
            bash -c 'pip install -e /workdir && /workdir/ci/build-and-verify-dts.sh'
